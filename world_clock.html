<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time & Weather Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/@joergdietrich/leaflet.terminator@1.0.0/terminator.js"></script>
    <style>
        :root { --bg: #f8f9fa; --text: #212529; --panel: #fff; --border: #ddd; }
        body.dark-mode { --bg: #1e1e1e; --text: #e0e0e0; --panel: #2d2d2d; --border: #444; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--text); }
        .container { display: flex; height: 100vh; }
        #sidebar { width: 380px; background: var(--bg); padding: 20px; overflow-y: auto; border-right: 1px solid var(--border); box-sizing: border-box; position: relative; }
        #map { flex: 1; }
        input[type="text"] { width: 100%; padding: 10px; margin-bottom: 15px; box-sizing: border-box; background: var(--panel); color: var(--text); border: 1px solid var(--border); }
        ul { list-style: none; padding: 0; margin: 0; }
        li { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); }
        li:hover { background: #e9ecef; }
        body.dark-mode li:hover { background: #3a3a3a; }
        .selected-item { background: var(--panel); padding: 15px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 4px; }
        button { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        button:hover { background: #c82333; }
        .btn-primary { background: #007bff; }
        .btn-success { background: #28a745; }
        h1, h2 { margin-top: 0; }
        .gear-icon { position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; background: none; border: none; color: var(--text); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel); padding: 25px; border-radius: 8px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); color: var(--text); }

        .custom-label {
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #1e90ff;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 13px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.25);
            white-space: nowrap;
        }
        body.dark-mode .custom-label { background: rgba(45,45,45,0.95); color: #fff; }
        .weather-info { font-size: 0.95em; color: #666; margin-top: 4px; }
        body.dark-mode .weather-info { color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <div id="sidebar">
            <button class="gear-icon" onclick="openPreferences()">⚙</button>
            <h1>World Time & Weather Map</h1>
            <h2>Select Cities</h2>
            <input type="text" id="search" placeholder="Search cities or countries...">
            <ul id="city-list"></ul>

            <div style="margin: 15px 0;">
                <button class="btn-primary" onclick="exportCities()" style="margin-right:8px;">Export Cities</button>
                <button class="btn-primary" onclick="document.getElementById('import-file').click()">Import Cities</button>
                <input type="file" id="import-file" accept=".json" style="display:none" onchange="importCities(event)">
            </div>

            <h2>Selected Cities</h2>
            <div id="selected-list"></div>
        </div>
        <div id="map"></div>
    </div>

    <!-- Preferences Modal -->
    <div id="preferences-modal" class="modal">
        <div class="modal-content">
            <h2>Preferences</h2>
            <label>Temperature Unit</label>
            <select id="temp-unit">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
            </select>

            <label>Time Format</label>
            <select id="time-format">
                <option value="12">12-hour</option>
                <option value="24">24-hour</option>
            </select>

            <label>Weather Refresh Interval</label>
            <select id="refresh-interval">
                <option value="300000">5 minutes</option>
                <option value="600000">10 minutes</option>
                <option value="900000">15 minutes</option>
            </select>

            <label><input type="checkbox" id="auto-fit"> Auto-fit map when adding cities</label>
            <label><input type="checkbox" id="show-icons"> Show weather icons on map</label>
            <label><input type="checkbox" id="show-daynight" checked> Show Day/Night Overlay</label>
            <label><input type="checkbox" id="dark-mode"> Enable Dark Mode</label>

            <div style="margin-top: 20px; text-align: right;">
                <button onclick="savePreferences()" class="btn-success" style="margin-right:8px;">Save</button>
                <button onclick="closePreferences()">Cancel</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const citiesData = [ /* same 10 cities as before */
            { name: "New York", country: "United States", lat: 40.7128, lng: -74.0060, tz: "America/New_York" },
            { name: "London", country: "United Kingdom", lat: 51.5074, lng: -0.1278, tz: "Europe/London" },
            { name: "Paris", country: "France", lat: 48.8566, lng: 2.3522, tz: "Europe/Paris" },
            { name: "Tokyo", country: "Japan", lat: 35.6895, lng: 139.6917, tz: "Asia/Tokyo" },
            { name: "Sydney", country: "Australia", lat: -33.8688, lng: 151.2093, tz: "Australia/Sydney" },
            { name: "Moscow", country: "Russia", lat: 55.7558, lng: 37.6173, tz: "Europe/Moscow" },
            { name: "Beijing", country: "China", lat: 39.9042, lng: 116.4074, tz: "Asia/Shanghai" },
            { name: "Cape Town", country: "South Africa", lat: -33.9249, lng: 18.4241, tz: "Africa/Johannesburg" },
            { name: "Rio de Janeiro", country: "Brazil", lat: -22.9068, lng: -43.1729, tz: "America/Sao_Paulo" },
            { name: "Los Angeles", country: "United States", lat: 34.0522, lng: -118.2437, tz: "America/Los_Angeles" }
        ];

        let map, selectedCities = [], cityLayers = {}, terminatorLayer = null;
        let preferences = {
            tempUnit: "celsius", timeFormat: "12", showIcons: true,
            darkMode: false, autoFit: true, refreshInterval: 600000,
            showDayNight: true
        };
        let weatherRefreshTimer = null;

        const weatherCodeMap = {
            0: "☀️ Clear sky", 1: "🌤️ Mainly clear", 2: "⛅ Partly cloudy", 3: "☁️ Overcast",
            45: "🌫️ Fog", 51: "🌧️ Light drizzle", 61: "🌦️ Slight rain", 71: "❄️ Slight snow",
            80: "🌧️ Rain showers", 95: "⛈️ Thunderstorm"
        };

        function loadPreferences() {
            const saved = localStorage.getItem("worldMapPreferences");
            if (saved) preferences = JSON.parse(saved);
            applyTheme();
        }

        function applyTheme() {
            if (preferences.darkMode) document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }

        function savePreferences() {
            preferences.tempUnit = document.getElementById("temp-unit").value;
            preferences.timeFormat = document.getElementById("time-format").value;
            preferences.showIcons = document.getElementById("show-icons").checked;
            preferences.showDayNight = document.getElementById("show-daynight").checked;
            preferences.darkMode = document.getElementById("dark-mode").checked;
            preferences.autoFit = document.getElementById("auto-fit").checked;
            preferences.refreshInterval = parseInt(document.getElementById("refresh-interval").value);

            localStorage.setItem("worldMapPreferences", JSON.stringify(preferences));
            applyTheme();
            closePreferences();
            refreshAllCities();
            updateTerminator();
            startWeatherRefresh();
        }

        function openPreferences() {
            document.getElementById("temp-unit").value = preferences.tempUnit;
            document.getElementById("time-format").value = preferences.timeFormat;
            document.getElementById("show-icons").checked = preferences.showIcons;
            document.getElementById("show-daynight").checked = preferences.showDayNight;
            document.getElementById("dark-mode").checked = preferences.darkMode;
            document.getElementById("auto-fit").checked = preferences.autoFit;
            document.getElementById("refresh-interval").value = preferences.refreshInterval;
            document.getElementById("preferences-modal").style.display = "flex";
        }

        function closePreferences() { document.getElementById("preferences-modal").style.display = "none"; }

        function initMap() {
            map = L.map('map').setView([20, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            terminatorLayer = L.terminator({ fillOpacity: 0.35 }).addTo(map);
        }

        function updateTerminator() {
            if (terminatorLayer) {
                if (preferences.showDayNight) {
                    terminatorLayer.setTime();   // refresh to current time
                    terminatorLayer.addTo(map);
                } else {
                    map.removeLayer(terminatorLayer);
                }
            }
        }

        // ... (getLocalTime, fetchWeather, refreshAllCities, addCity, removeCity, renderSelectedList, renderCityList, fitMapToCities, export/import functions remain identical to previous version)

        function getLocalTime(tz) { /* unchanged */
            try {
                const options = { timeZone: tz, hour: 'numeric', minute: '2-digit' };
                if (preferences.timeFormat === "24") options.hour12 = false;
                return new Intl.DateTimeFormat('en-US', options).format(new Date());
            } catch (e) { return 'N/A'; }
        }

        async function fetchWeather(lat, lng) { /* unchanged from previous */
            try {
                const unitParam = preferences.tempUnit === "fahrenheit" ? "fahrenheit" : "celsius";
                const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,weather_code&temperature_unit=${unitParam}&timezone=auto`;
                const res = await fetch(url);
                const data = await res.json();
                const code = data.current.weather_code;
                return {
                    temperature: Math.round(data.current.temperature_2m),
                    condition: weatherCodeMap[code] || "Unknown",
                    icon: weatherCodeMap[code] ? weatherCodeMap[code].split(" ")[0] : "🌡️"
                };
            } catch (e) {
                return { temperature: null, condition: "Unavailable", icon: "❓" };
            }
        }

        function refreshAllCities() { /* unchanged */
            renderSelectedList();
            selectedCities.forEach(city => {
                if (cityLayers[city.name]) {
                    const label = cityLayers[city.name].label;
                    const timeStr = getLocalTime(city.tz);
                    const iconPart = preferences.showIcons && city.weather ? city.weather.icon + " " : "";
                    label.setContent(`<div class="custom-label"><strong>${city.name}</strong><br>${iconPart}${timeStr}</div>`);
                }
            });
        }

        async function addCity(city) { /* unchanged except calling updateTerminator if needed */
            if (selectedCities.find(c => c.name === city.name)) return;
            selectedCities.push(city);

            const circle = L.circleMarker([city.lat, city.lng], { radius: 8, fillColor: "#1e90ff", color: "#fff", weight: 3, opacity: 1, fillOpacity: 0.9 }).addTo(map);
            const label = L.tooltip({ permanent: true, direction: 'right', offset: [12, 0], interactive: false })
                .setLatLng([city.lat, city.lng]).addTo(map);

            cityLayers[city.name] = { circle, label };

            const weather = await fetchWeather(city.lat, city.lng);
            city.weather = weather;

            renderSelectedList();
            refreshAllCities();
            if (preferences.autoFit) fitMapToCities();
        }

        function removeCity(name) { /* unchanged */
            const index = selectedCities.findIndex(c => c.name === name);
            if (index > -1) {
                selectedCities.splice(index, 1);
                if (cityLayers[name]) {
                    map.removeLayer(cityLayers[name].circle);
                    map.removeLayer(cityLayers[name].label);
                    delete cityLayers[name];
                }
                renderSelectedList();
            }
        }

        function renderSelectedList() { /* unchanged */
            const container = document.getElementById('selected-list');
            container.innerHTML = '';
            selectedCities.forEach(city => {
                const div = document.createElement('div');
                div.className = 'selected-item';
                const safeId = `time-${city.name.replace(/\s+/g, '-')}`;
                const temp = city.weather && city.weather.temperature !== null
                    ? `${city.weather.temperature}°${preferences.tempUnit === "fahrenheit" ? "F" : "C"}`
                    : '—';
                const cond = city.weather ? city.weather.condition : '—';

                div.innerHTML = `
                    <strong>${city.name}, ${city.country}</strong><br>
                    Local time: <span id="${safeId}">${getLocalTime(city.tz)}</span><br>
                    <span class="weather-info">Weather: ${temp} • ${cond}</span>
                    <button onclick="removeCity('${city.name}')" style="float:right;">Remove</button>
                `;
                container.appendChild(div);
            });
        }

        function renderCityList(filteredCities) { /* unchanged */
            const list = document.getElementById('city-list');
            list.innerHTML = '';
            filteredCities.forEach(city => {
                const li = document.createElement('li');
                li.textContent = `${city.name}, ${city.country}`;
                li.addEventListener('click', () => addCity(city));
                list.appendChild(li);
            });
        }

        function fitMapToCities() {
            if (selectedCities.length === 0) return;
            const bounds = L.latLngBounds(selectedCities.map(c => [c.lat, c.lng]));
            map.fitBounds(bounds, { padding: [50, 50] });
        }

        function exportCities() { /* unchanged */
            const dataStr = JSON.stringify(selectedCities, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "selected-cities.json"; a.click();
        }

        function importCities(e) { /* unchanged */
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    const imported = JSON.parse(ev.target.result);
                    imported.forEach(city => {
                        if (!selectedCities.find(c => c.name === city.name)) addCity(city);
                    });
                } catch (err) { alert("Invalid import file"); }
            };
            reader.readAsText(file);
        }

        function startWeatherRefresh() { /* unchanged */
            if (weatherRefreshTimer) clearInterval(weatherRefreshTimer);
            weatherRefreshTimer = setInterval(async () => {
                for (const city of selectedCities) {
                    city.weather = await fetchWeather(city.lat, city.lng);
                }
                renderSelectedList();
                refreshAllCities();
            }, preferences.refreshInterval);
        }

        function initializeApp() {
            loadPreferences();
            initMap();
            renderCityList(citiesData);

            document.getElementById('search').addEventListener('input', () => {
                const term = document.getElementById('search').value.toLowerCase().trim();
                const filtered = citiesData.filter(c =>
                    c.name.toLowerCase().includes(term) || c.country.toLowerCase().includes(term)
                );
                renderCityList(filtered);
            });

            setInterval(refreshAllCities, 30000);
            startWeatherRefresh();
            setInterval(updateTerminator, 60000); // refresh terminator every minute
        }

        window.onload = initializeApp;
    </script>
</body>
</html>
