<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Time & Weather</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
/* ── Reset & tokens ─────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface2: #f0f0ee;
  --border: rgba(0,0,0,.10);
  --border-strong: rgba(0,0,0,.18);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --accent: #2563eb;
  --accent-bg: #eff6ff;
  --accent-text: #1d4ed8;
  --hover: #f0f0ee;
  --danger: #dc2626;
  --danger-bg: #fef2f2;
  --success: #16a34a;
  --tag-bg: #e8f0fe;
  --tag-text: #1d4ed8;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
  --radius: 8px;
  --radius-lg: 12px;
  --sidebar-width: 340px;
  --header-h: 56px;
}

body.dark {
  --bg: #111;
  --surface: #1c1c1c;
  --surface2: #242424;
  --border: rgba(255,255,255,.09);
  --border-strong: rgba(255,255,255,.16);
  --text: #f0f0f0;
  --text2: #a0a0a0;
  --text3: #666;
  --accent: #3b82f6;
  --accent-bg: #1e3a5f;
  --accent-text: #93c5fd;
  --hover: #2a2a2a;
  --danger: #f87171;
  --danger-bg: #3f1f1f;
  --success: #4ade80;
  --tag-bg: #1e3a5f;
  --tag-text: #93c5fd;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* ── Layout ─────────────────────────────────────────────── */
.app { display: flex; height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-right: 1px solid var(--border);
  overflow: hidden;
  transition: width .25s ease;
}

#sidebar.collapsed {
  width: 0;
  min-width: 0;
  border-right: none;
}

.sidebar-top {
  flex-shrink: 0;
  padding: 14px 14px 0;
  border-bottom: 1px solid var(--border);
}

.app-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -.2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-title-left { display: flex; align-items: center; gap: 6px; }
.app-title-icon { font-size: 18px; line-height: 1; }

.search-row {
  display: flex;
  gap: 6px;
  margin-bottom: 10px;
}

.search-wrap {
  position: relative;
  flex: 1;
}

.search-wrap input {
  width: 100%;
  padding: 7px 28px 7px 9px;
  font-size: 13px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  outline: none;
  transition: border-color .15s, box-shadow .15s;
}
.search-wrap input::placeholder { color: var(--text3); }
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent); }
.search-clear {
  position: absolute;
  right: 7px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text3);
  font-size: 13px;
  display: none;
  line-height: 1;
  padding: 2px;
}
.search-wrap input:not(:placeholder-shown) ~ .search-clear { display: block; }

/* sort select */
.sort-select {
  padding: 6px 8px;
  font-size: 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  outline: none;
}

/* Tab bar */
.tabs {
  display: flex;
  gap: 0;
  margin: 0 -14px;
}
.tab {
  flex: 1;
  padding: 9px 4px;
  font-size: 12px;
  font-weight: 500;
  text-align: center;
  cursor: pointer;
  border: none;
  background: none;
  color: var(--text2);
  border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
  white-space: nowrap;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* Panels */
.panel { flex: 1; overflow-y: auto; padding: 8px 10px; }
.panel.hidden { display: none; }

/* City browse list */
#city-list { list-style: none; }
#city-list li {
  padding: 8px 8px;
  cursor: pointer;
  border-radius: var(--radius);
  font-size: 13px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 6px;
  transition: background .1s;
  border: 1px solid transparent;
}
#city-list li:hover:not(.is-added) { background: var(--hover); border-color: var(--border); }
#city-list li.is-added { opacity: .4; cursor: default; }
#city-list li .city-sub { font-size: 11px; color: var(--text2); }
.tz-chip {
  font-size: 10px;
  font-weight: 500;
  color: var(--tag-text);
  background: var(--tag-bg);
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

/* Selected city cards */
.city-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 12px 12px 10px;
  margin-bottom: 8px;
  transition: border-color .15s;
  position: relative;
}
.city-card:hover { border-color: var(--border-strong); }
.city-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2px; }
.city-card-name { font-size: 13px; font-weight: 600; }
.city-card-country { font-size: 11px; color: var(--text2); }
.city-card-time {
  font-size: 26px;
  font-weight: 300;
  letter-spacing: -1px;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin: 6px 0 2px;
}
.city-card-date { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
.city-card-weather {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--text2);
  align-items: center;
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 2px;
}
.city-card-weather .wicon { font-size: 16px; }
.city-card-weather .wtemp { font-size: 14px; font-weight: 500; color: var(--text); }

/* Remove button */
.btn-remove {
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 3px 8px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 11px;
  line-height: 1.4;
  transition: all .15s;
  flex-shrink: 0;
}
.btn-remove:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }

/* Loading spinner */
.spinner {
  display: inline-block;
  width: 10px; height: 10px;
  border: 1.5px solid var(--border-strong);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Empty state */
.empty {
  text-align: center;
  padding: 40px 16px;
  color: var(--text3);
  font-size: 13px;
  line-height: 1.6;
}

/* Sidebar footer */
.sidebar-footer {
  flex-shrink: 0;
  padding: 8px 10px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 5px;
  align-items: center;
  background: var(--surface);
}
.btn-sm {
  padding: 5px 9px;
  font-size: 11px;
  font-weight: 500;
  border-radius: 6px;
  border: 1px solid var(--border-strong);
  background: var(--surface2);
  color: var(--text);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-sm:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); }
.btn-sm.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }
.btn-sm.icon { padding: 5px 7px; font-size: 14px; margin-left: auto; }

/* ── Map toggle button ───────────────────────────────────── */
#toggle-sidebar {
  position: absolute;
  top: 14px;
  left: 14px;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  padding: 6px 9px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
  box-shadow: var(--shadow);
  transition: all .15s;
}
#toggle-sidebar:hover { background: var(--hover); }

/* ── Map container ───────────────────────────────────────── */
#map-wrap { flex: 1; position: relative; }
#map { width: 100%; height: 100%; }

/* Leaflet tooltip override */
.city-tooltip {
  background: var(--surface) !important;
  border: 1.5px solid var(--accent) !important;
  border-radius: 6px !important;
  padding: 5px 8px !important;
  font-size: 11px !important;
  font-family: inherit !important;
  color: var(--text) !important;
  box-shadow: var(--shadow) !important;
  white-space: nowrap;
  line-height: 1.5;
  pointer-events: none;
}
.city-tooltip::before { display: none !important; }
.city-tooltip-name { font-weight: 600; font-size: 12px; }
.city-tooltip-line { color: var(--text2); font-size: 11px; }

/* ── Modal overlay ───────────────────────────────────────── */
.modal-overlay {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 5000;
  align-items: center;
  justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: 22px 22px 18px;
  width: 310px;
  max-height: 90vh;
  overflow-y: auto;
  border: 1px solid var(--border-strong);
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.modal h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.pref-group { margin-bottom: 13px; }
.pref-group label { display: block; font-size: 11px; font-weight: 500; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
.pref-group select { width: 100%; padding: 7px 9px; font-size: 13px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: var(--surface2); color: var(--text); outline: none; }
.pref-group select:focus { border-color: var(--accent); }
.check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; cursor: pointer; }
.check-row input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.check-row span { font-size: 13px; color: var(--text); }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.btn-primary { padding: 7px 16px; font-size: 13px; font-weight: 500; border-radius: 6px; border: none; background: var(--accent); color: #fff; cursor: pointer; transition: opacity .15s; }
.btn-primary:hover { opacity: .88; }
.btn-secondary { padding: 7px 14px; font-size: 13px; border-radius: 6px; border: 1px solid var(--border-strong); background: var(--surface2); color: var(--text); cursor: pointer; transition: background .15s; }
.btn-secondary:hover { background: var(--hover); }

/* ── Status bar ──────────────────────────────────────────── */
#status-bar {
  position: absolute;
  bottom: 10px;
  right: 10px;
  z-index: 1000;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 5px 10px;
  font-size: 11px;
  color: var(--text2);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 6px;
}
#status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--success);
  flex-shrink: 0;
  transition: background .3s;
}
#status-dot.loading { background: var(--accent); animation: pulse 1s infinite; }
#status-dot.error { background: var(--danger); }
@keyframes pulse { 0%,100%{opacity:.3}50%{opacity:1} }

/* ── Clock widget overlay (right side of map) ────────────── */
#clock-panel {
  position: absolute;
  top: 14px;
  right: 14px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 6px;
  pointer-events: none;
}
.clock-mini {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px 10px;
  box-shadow: var(--shadow);
  font-size: 11px;
  line-height: 1.4;
  min-width: 120px;
  pointer-events: auto;
}
.clock-mini-city { font-weight: 600; font-size: 11px; color: var(--text); }
.clock-mini-time { font-size: 16px; font-weight: 300; letter-spacing: -.5px; font-variant-numeric: tabular-nums; color: var(--text); }
.clock-mini-meta { font-size: 10px; color: var(--text2); }

/* ── Cookie consent banner ───────────────────────────── */
#consent-banner {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 9999;
  background: var(--surface);
  border-top: 1px solid var(--border-strong);
  padding: 14px 20px;
  align-items: center;
  gap: 14px;
  box-shadow: 0 -2px 12px rgba(0,0,0,.1);
  flex-wrap: wrap;
}
#consent-banner p {
  flex: 1;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  min-width: 220px;
}
#consent-banner p strong { color: var(--text); font-weight: 600; }
.consent-btns { display: flex; gap: 8px; flex-shrink: 0; }

/* scrollbar slim */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
</style>
</head>
<body>

<div class="app" id="app">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sidebar-top">
      <div class="app-title">
        <div class="app-title-left">
          <span class="app-title-icon">🌍</span>
          World Time &amp; Weather
        </div>
      </div>
      <div class="search-row">
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search cities or countries…" autocomplete="off">
          <button class="search-clear" onclick="clearSearch()">✕</button>
        </div>
        <select class="sort-select" id="sort-select" onchange="renderBrowseList()">
          <option value="name">A–Z</option>
          <option value="region">Region</option>
        </select>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('browse',this)" id="tab-browse">Browse</button>
        <button class="tab" onclick="switchTab('selected',this)" id="tab-selected">Selected <span id="sel-badge"></span></button>
      </div>
    </div>

    <div id="panel-browse" class="panel">
      <ul id="city-list"></ul>
    </div>

    <div id="panel-selected" class="panel hidden">
      <div id="selected-list"></div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-sm" onclick="exportCities()" title="Export selected cities as JSON">↑ Export</button>
      <button class="btn-sm" onclick="document.getElementById('import-input').click()" title="Import cities from JSON">↓ Import</button>
      <input type="file" id="import-input" accept=".json" style="display:none" onchange="importCities(event)">
      <button class="btn-sm danger" onclick="clearAll()">Clear all</button>
      <button class="btn-sm icon" onclick="openPrefs()" title="Preferences">⚙</button>
    </div>
  </div>

  <!-- Map -->
  <div id="map-wrap">
    <button id="toggle-sidebar" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <div id="map"></div>
    <div id="clock-panel"></div>
    <div id="status-bar">
      <div id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
  </div>
</div>

<!-- Preferences Modal -->
<div class="modal-overlay" id="prefs-overlay">
  <div class="modal">
    <h2>Preferences</h2>

    <div class="pref-group">
      <label>Temperature unit</label>
      <select id="p-temp">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
      </select>
    </div>

    <div class="pref-group">
      <label>Time format</label>
      <select id="p-timefmt">
        <option value="12">12-hour (3:45 PM)</option>
        <option value="24">24-hour (15:45)</option>
      </select>
    </div>

    <div class="pref-group">
      <label>Map style</label>
      <select id="p-mapstyle">
        <option value="osm">OpenStreetMap (default)</option>
        <option value="topo">OpenTopoMap</option>
        <option value="dark">CartoDB Dark</option>
        <option value="light">CartoDB Light</option>
      </select>
    </div>

    <div class="pref-group">
      <label>Weather auto-refresh</label>
      <select id="p-refresh">
        <option value="300000">Every 5 minutes</option>
        <option value="600000">Every 10 minutes</option>
        <option value="900000">Every 15 minutes</option>
        <option value="1800000">Every 30 minutes</option>
      </select>
    </div>

    <label class="check-row"><input type="checkbox" id="p-daynight"><span>Day/night overlay</span></label>
    <label class="check-row"><input type="checkbox" id="p-icons"><span>Weather icons on map labels</span></label>
    <label class="check-row"><input type="checkbox" id="p-clock"><span>Clock panel on map</span></label>
    <label class="check-row"><input type="checkbox" id="p-autofit"><span>Auto-fit map when adding cities</span></label>
    <label class="check-row"><input type="checkbox" id="p-dark" onchange="syncMapStyleSelect()"><span>Dark mode</span></label>

    <div class="modal-footer">
      <button class="btn-secondary" onclick="closePrefs()">Cancel</button>
      <button class="btn-primary" onclick="savePrefs()">Save</button>
    </div>
  </div>
</div>

<!-- Cookie consent banner -->
<div id="consent-banner">
  <p><strong>This site uses local storage</strong> to remember your selected cities and preferences across visits. No data is sent to any server.</p>
  <div class="consent-btns">
    <button class="btn-secondary" onclick="declineConsent()">Decline</button>
    <button class="btn-primary" onclick="acceptConsent()">Accept &amp; remember my settings</button>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── Inline terminator (no external dep, always available) ── */
(function () {
  const D2R = Math.PI / 180;
  const R2D = 180 / Math.PI;

  // Julian date from JS timestamp (ms since Unix epoch)
  function julianDate(ms) {
    return ms / 86400000 + 2440587.5;
  }

  // Greenwich Mean Sidereal Time in degrees (0–360)
  function gmstDeg(jd) {
    const T = (jd - 2451545.0) / 36525;
    let gmst = 280.46061837
      + 360.98564736629 * (jd - 2451545)
      + 0.000387933 * T * T
      - (T * T * T) / 38710000;
    return ((gmst % 360) + 360) % 360;
  }

  // Sun's geocentric ecliptic longitude → equatorial coords
  // Returns { ra (deg, 0-360), dec (deg) }
  function sunPosition(jd) {
    const n = jd - 2451545.0;
    // Mean longitude & mean anomaly (degrees)
    const L = ((280.460 + 0.9856474 * n) % 360 + 360) % 360;
    const g = ((357.528 + 0.9856003 * n) % 360 + 360) % 360;
    const gR = g * D2R;
    // Ecliptic longitude
    const lambda = L + 1.915 * Math.sin(gR) + 0.020 * Math.sin(2 * gR);
    const lambdaR = lambda * D2R;
    // Obliquity of ecliptic
    const eps = (23.439 - 0.0000004 * n) * D2R;
    // Right ascension & declination
    const ra  = (Math.atan2(Math.cos(eps) * Math.sin(lambdaR), Math.cos(lambdaR)) * R2D + 360) % 360;
    const dec = Math.asin(Math.sin(eps) * Math.sin(lambdaR)) * R2D;
    return { ra, dec };
  }

  // For a given geographic longitude (deg) and the sun's
  // sub-solar longitude (GHA, deg) and declination (dec, deg),
  // compute the latitude of the terminator.
  // GHA = GMST - RA  (Greenwich Hour Angle of the Sun)
  // terminator condition: cos(zenith) = 0  →  sin(lat)·sin(dec) + cos(lat)·cos(dec)·cos(LHA) = 0
  // → lat = atan( -cos(LHA) / tan(dec) )   where LHA = lng - GHA (subtracting to get local hour angle)
  function terminatorLat(lngDeg, ghaDeg, decDeg) {
    // LHA = GHA + east_longitude  (longitude is negative for west, e.g. -86.5 for Destin FL)
    // This is the standard astronomical formula: LHA = GMST − RA + λ = GHA + λ
    const lha = (ghaDeg + lngDeg) * D2R;
    const decR = decDeg * D2R;
    // Guard against dec == 0 (equinox): atan of ±Infinity → ±90
    return Math.atan(-Math.cos(lha) / Math.tan(decR)) * R2D;
  }

  L.Terminator = L.Polygon.extend({
    options: {
      color: 'transparent',
      fillColor: '#000',
      fillOpacity: 0.32,
      weight: 0,
      resolution: 1,   // degrees; 1° gives smooth curve
    },

    initialize: function (options) {
      L.setOptions(this, options);
      this.setTime(new Date());
    },

    setTime: function (date) {
      date = date || new Date();
      const jd   = julianDate(date.getTime());
      const sun  = sunPosition(jd);
      const gmst = gmstDeg(jd);

      // Greenwich Hour Angle of the Sun (degrees, 0–360)
      const gha = ((gmst - sun.ra) % 360 + 360) % 360;

      // Build terminator curve: one lat point per longitude step
      const step = this.options.resolution;
      const curve = [];
      for (let lng = -180; lng <= 180; lng += step) {
        const lat = terminatorLat(lng, gha, sun.dec);
        // Skip degenerate points near the poles
        if (isFinite(lat) && lat >= -90 && lat <= 90) {
          curve.push([lat, lng]);
        }
      }

      // Close the polygon on the night side:
      // If dec > 0  → sun is in northern hemisphere → south pole is in night
      // If dec < 0  → sun is in southern hemisphere → north pole is in night
      // If dec == 0 → terminator runs exactly along a meridian (equinox edge case)
      const nightPole = sun.dec >= 0 ? -90 : 90;
      const ring = [
        [nightPole, -180],
        ...curve,
        [nightPole,  180],
      ];

      this.setLatLngs([ring]);
    },
  });

  L.terminator = function (options) { return new L.Terminator(options); };
})();

function syncMapStyleSelect() {
  const dark = document.getElementById("p-dark").checked;
  const sel  = document.getElementById("p-mapstyle");
  if (dark) {
    sel.value    = "dark";
    sel.disabled = true;
    sel.style.opacity = "0.45";
    sel.style.cursor  = "not-allowed";
  } else {
    if (sel.value === "dark" && prefs.darkMode) sel.value = "osm";
    sel.disabled = false;
    sel.style.opacity = "";
    sel.style.cursor  = "";
  }
}

  document.getElementById("p-temp").value     = prefs.tempUnit;
  document.getElementById("p-timefmt").value  = prefs.timeFormat;

  document.getElementById("p-refresh").value  = prefs.refreshInterval;
  document.getElementById("p-daynight").checked = prefs.showDayNight;
  document.getElementById("p-icons").checked    = prefs.showIcons;
  document.getElementById("p-clock").checked    = prefs.showClock;
  document.getElementById("p-autofit").checked  = prefs.autoFit;
  document.getElementById("p-dark").checked     = prefs.darkMode;
  syncMapStyleSelect();
  document.getElementById("prefs-overlay").classList.add("open");
}

function closePrefs() {
  document.getElementById("prefs-overlay").classList.remove("open");
}

function savePrefs() {
  const oldMapStyle = prefs.mapStyle;
  const darkMode    = document.getElementById("p-dark").checked;

  prefs.tempUnit      = document.getElementById("p-temp").value;
  prefs.timeFormat    = document.getElementById("p-timefmt").value;
  prefs.refreshInterval = parseInt(document.getElementById("p-refresh").value);
  prefs.showDayNight  = document.getElementById("p-daynight").checked;
  prefs.showIcons     = document.getElementById("p-icons").checked;
  prefs.showClock     = document.getElementById("p-clock").checked;
  prefs.autoFit       = document.getElementById("p-autofit").checked;
  prefs.darkMode      = darkMode;

  // When dark mode is on, lock map to CartoDB Dark.
  // When turning dark mode off, fall back to the last manually chosen style (or OSM).
  if (darkMode) {
    prefs.mapStyle = "dark";
  } else {
    const chosen = document.getElementById("p-mapstyle").value;
    prefs.mapStyle = chosen === "dark" ? "osm" : chosen;
  }

  if (storageAllowed()) localStorage.setItem("wtw_prefs_v2", JSON.stringify(prefs));
  applyTheme();
  closePrefs();

  if (prefs.mapStyle !== oldMapStyle) applyMapStyle();
  updateTerminator();
  refreshAllMapLabels();
  renderSelectedList();
  renderClockPanel();
  startWeatherRefresh();
}

/* ══════════════════════════════════════════════════════
   MAP SETUP
═══════════════════════════════════════════════════════ */
const TILE_URLS = {
  osm:   ["https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", "© OpenStreetMap contributors"],
  topo:  ["https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", "© OpenTopoMap"],
  dark:  ["https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", "© CartoDB"],
  light: ["https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", "© CartoDB"],
};

function initMap() {
  map = L.map("map", { zoomControl: false }).setView([20, 10], 2);
  L.control.zoom({ position: "bottomleft" }).addTo(map);

  const [url, attr] = TILE_URLS[prefs.mapStyle] || TILE_URLS.osm;
  tileLayer = L.tileLayer(url, { attribution: attr, maxZoom: 18 }).addTo(map);

  terminator = L.terminator({ fillOpacity: 0.28, fillColor: "#000" });
  if (prefs.showDayNight) terminator.addTo(map);

  // Click on map to deselect / close popups
  map.on("click", () => map.closePopup());
}

function applyMapStyle() {
  if (tileLayer) map.removeLayer(tileLayer);
  const [url, attr] = TILE_URLS[prefs.mapStyle] || TILE_URLS.osm;
  tileLayer = L.tileLayer(url, { attribution: attr, maxZoom: 18 }).addTo(map);
  // Keep terminator on top
  if (prefs.showDayNight && map.hasLayer(terminator)) {
    terminator.remove(); terminator.addTo(map);
  }
}

function updateTerminator() {
  if (!terminator) return;
  if (prefs.showDayNight) {
    terminator.setTime(new Date());
    if (!map.hasLayer(terminator)) terminator.addTo(map);
  } else {
    if (map.hasLayer(terminator)) map.removeLayer(terminator);
  }
}

/* ══════════════════════════════════════════════════════
   TIME HELPERS
═══════════════════════════════════════════════════════ */
function localTime(tz) {
  try {
    const opts = { timeZone: tz, hour: "numeric", minute: "2-digit" };
    if (prefs.timeFormat === "24") opts.hour12 = false;
    return new Intl.DateTimeFormat("en-US", opts).format(new Date());
  } catch (_) { return "—"; }
}

function localDate(tz) {
  try {
    return new Intl.DateTimeFormat("en-US", {
      timeZone: tz, weekday: "short", month: "short", day: "numeric"
    }).format(new Date());
  } catch (_) { return ""; }
}

function utcOffset(tz) {
  try {
    const s = new Intl.DateTimeFormat("en", {
      timeZone: tz, timeZoneName: "shortOffset"
    }).formatToParts(new Date()).find(p => p.type === "timeZoneName");
    return s ? s.value : "";
  } catch (_) { return ""; }
}

/* ══════════════════════════════════════════════════════
   WEATHER API  (Open-Meteo, free, no key needed)
═══════════════════════════════════════════════════════ */
function setStatus(state, text) {
  document.getElementById("status-dot").className = state === "loading" ? "loading" :
    state === "error" ? "error" : "";
  document.getElementById("status-text").textContent = text;
}

async function fetchWeather(lat, lng) {
  const unit = prefs.tempUnit === "fahrenheit" ? "fahrenheit" : "celsius";
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}` +
    `&current=temperature_2m,weather_code,wind_speed_10m,relative_humidity_2m,apparent_temperature` +
    `&temperature_unit=${unit}&timezone=auto&wind_speed_unit=kmh`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();
    const c = data.current;
    const w = wmo(c.weather_code);
    return {
      temperature: Math.round(c.temperature_2m),
      feelsLike:   Math.round(c.apparent_temperature),
      icon:        w.icon,
      condition:   w.label,
      wind:        Math.round(c.wind_speed_10m),
      humidity:    c.relative_humidity_2m,
      code:        c.weather_code,
      unit:        prefs.tempUnit,
    };
  } catch (e) {
    return { temperature: null, feelsLike: null, icon: "❓", condition: "Unavailable", wind: null, humidity: null };
  }
}

/* ══════════════════════════════════════════════════════

═══════════════════════════════════════════════════════ */
function buildTooltipHTML(city) {
  const time = localTime(city.tz);
  const temp = city.weather && city.weather.temperature !== null
    ? `${city.weather.temperature}°${prefs.tempUnit === "fahrenheit" ? "F" : "C"}` : "";
  const icon = prefs.showIcons && city.weather ? city.weather.icon : "";
  return `<div class="city-tooltip">
    <div class="city-tooltip-name">${city.name}</div>
    <div class="city-tooltip-line">${icon ? icon + " " : ""}${time}${temp ? " · " + temp : ""}</div>
  </div>`;
}

function refreshAllMapLabels() {
  selectedCities.forEach(city => {
    const layer = cityLayers[city.name];
    if (layer) layer.tooltip.setContent(buildTooltipHTML(city));
  });
}

async function addCity(city) {
  if (selectedCities.find(c => c.name === city.name)) return;

  const enriched = { ...city, weather: null };
  selectedCities.push(enriched);

  // Marker
  const marker = L.circleMarker([city.lat, city.lng], {
    radius: 8, fillColor: "#2563eb", color: "#fff",
    weight: 2.5, opacity: 1, fillOpacity: 0.9,
  }).addTo(map);

  // Tooltip (permanent label)
  const tooltip = L.tooltip({
    permanent: true, direction: "right", offset: [12, 0],
    className: "city-tooltip-wrapper", interactive: false,
  }).setLatLng([city.lat, city.lng]).addTo(map);

  cityLayers[city.name] = { marker, tooltip };
  tooltip.setContent(buildTooltipHTML(enriched));

  // Click marker → jump to Selected tab and scroll to card
  marker.on("click", () => {
    switchTab("selected", document.getElementById("tab-selected"));
    setTimeout(() => {
      const el = document.getElementById(`card-${slugify(city.name)}`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 50);
  });

  renderBrowseList();
  renderSelectedList();
  renderClockPanel();
  if (prefs.autoFit) fitMap();

  // Fetch weather asynchronously
  setStatus("loading", `Fetching weather…`);
  const weather = await fetchWeather(city.lat, city.lng);
  enriched.weather = weather;
  tooltip.setContent(buildTooltipHTML(enriched));
  renderSelectedList();
  renderClockPanel();
  saveCities();
  setStatus("ok", `Updated ${new Date().toLocaleTimeString()}`);
}

function removeCity(name) {
  const idx = selectedCities.findIndex(c => c.name === name);
  if (idx === -1) return;
  selectedCities.splice(idx, 1);
  if (cityLayers[name]) {
    map.removeLayer(cityLayers[name].marker);
    map.removeLayer(cityLayers[name].tooltip);
    delete cityLayers[name];
  }
  renderBrowseList();
  renderSelectedList();
  renderClockPanel();
  updateSelBadge();
  saveCities();
}

function clearAll() {
  if (!selectedCities.length) return;
  if (!confirm(`Remove all ${selectedCities.length} selected cities?`)) return;
  [...selectedCities].forEach(c => removeCity(c.name));
}

function fitMap() {
  if (!selectedCities.length) return;
  const bounds = L.latLngBounds(selectedCities.map(c => [c.lat, c.lng]));
  map.fitBounds(bounds, { padding: [60, 60], maxZoom: 8 });
}

/* ══════════════════════════════════════════════════════
   RENDER  –  Browse list
═══════════════════════════════════════════════════════ */
function renderBrowseList() {
  const term = document.getElementById("search").value.toLowerCase().trim();
  const sort = document.getElementById("sort-select").value;

  let list = ALL_CITIES.filter(c =>
    !term ||
    c.name.toLowerCase().includes(term) ||
    c.country.toLowerCase().includes(term) ||
    c.region.toLowerCase().includes(term)
  );

  if (sort === "region") {
    list = list.sort((a, b) => a.region.localeCompare(b.region) || a.name.localeCompare(b.name));
  }

  const ul = document.getElementById("city-list");
  ul.innerHTML = "";

  // Group headers for region sort
  let lastRegion = null;

  list.forEach(city => {
    if (sort === "region" && city.region !== lastRegion) {
      lastRegion = city.region;
      const li = document.createElement("li");
      li.style.cssText = "font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);padding:10px 8px 4px;cursor:default;border:none;";
      li.textContent = city.region;
      li.classList.add("is-added"); // prevent hover
      ul.appendChild(li);
    }

    const added = !!selectedCities.find(c => c.name === city.name);
    const li = document.createElement("li");
    li.className = added ? "is-added" : "";

    const tzShort = city.tz.split("/").pop().replace(/_/g, " ");
    li.innerHTML = `
      <div>
        <div>${city.name}</div>
        <div class="city-sub">${city.country}</div>
      </div>
      <span class="tz-chip">${tzShort}</span>
    `;
    if (!added) li.addEventListener("click", () => addCity(city));
    ul.appendChild(li);
  });

  if (!list.length) {
    ul.innerHTML = `<div class="empty">No cities match "<strong>${term}</strong>"</div>`;
  }
}

/* ══════════════════════════════════════════════════════
   RENDER  –  Selected list
═══════════════════════════════════════════════════════ */
function renderSelectedList() {
  const container = document.getElementById("selected-list");
  updateSelBadge();

  if (!selectedCities.length) {
    container.innerHTML = `<div class="empty">No cities selected yet.<br>Search or browse to add some.</div>`;
    return;
  }

  container.innerHTML = "";
  selectedCities.forEach(city => {
    const div = document.createElement("div");
    div.className = "city-card";
    div.id = `card-${slugify(city.name)}`;

    const hasWeather = city.weather && city.weather.temperature !== null;
    const tempUnit = prefs.tempUnit === "fahrenheit" ? "°F" : "°C";
    const temp     = hasWeather ? `${city.weather.temperature}${tempUnit}` : "—";
    const feels    = hasWeather && city.weather.feelsLike !== null ? `Feels like ${city.weather.feelsLike}${tempUnit}` : "";
    const cond     = city.weather ? city.weather.condition : "Loading…";
    const icon     = city.weather ? city.weather.icon : "";
    const wind     = hasWeather && city.weather.wind !== null ? `💨 ${city.weather.wind} km/h` : "";
    const hum      = hasWeather && city.weather.humidity != null ? `💧 ${city.weather.humidity}%` : "";
    const offset   = utcOffset(city.tz);
    const spinner  = !city.weather ? `<span class="spinner"></span>` : "";

    div.innerHTML = `
      <div class="city-card-header">
        <div>
          <div class="city-card-name">${city.name}</div>
          <div class="city-card-country">${city.country} · ${offset}</div>
        </div>
        <button class="btn-remove" onclick="removeCity('${escQ(city.name)}')">Remove</button>
      </div>
      <div class="city-card-time" id="time-${slugify(city.name)}">${localTime(city.tz)}</div>
      <div class="city-card-date">${localDate(city.tz)}</div>
      <div class="city-card-weather">
        ${icon ? `<span class="wicon">${icon}</span>` : spinner}
        ${hasWeather ? `<span class="wtemp">${temp}</span>` : ""}
        <span>${cond}</span>
        ${feels ? `<span>${feels}</span>` : ""}
        ${wind  ? `<span>${wind}</span>` : ""}
        ${hum   ? `<span>${hum}</span>` : ""}
      </div>
    `;
    container.appendChild(div);
  });
}

/* ══════════════════════════════════════════════════════
   RENDER  –  Clock panel on map
═══════════════════════════════════════════════════════ */
function renderClockPanel() {
  const panel = document.getElementById("clock-panel");
  if (!prefs.showClock || !selectedCities.length) { panel.innerHTML = ""; return; }

  // Show max 5 clocks to avoid clutter
  const list = selectedCities.slice(0, 5);
  panel.innerHTML = list.map(city => `
    <div class="clock-mini">
      <div class="clock-mini-city">${city.name}</div>
      <div class="clock-mini-time" id="clk-${slugify(city.name)}">${localTime(city.tz)}</div>
      <div class="clock-mini-meta">${city.weather && city.weather.icon ? city.weather.icon + " " : ""}${city.weather && city.weather.temperature !== null ? city.weather.temperature + (prefs.tempUnit === "fahrenheit" ? "°F" : "°C") : ""}</div>
    </div>
  `).join("");
}

/* ══════════════════════════════════════════════════════
   LIVE CLOCK  – ticks every second
═══════════════════════════════════════════════════════ */
function tickClocks() {
  selectedCities.forEach(city => {
    const slug = slugify(city.name);
    const el = document.getElementById("time-" + slug);
    if (el) el.textContent = localTime(city.tz);
    const cl = document.getElementById("clk-" + slug);
    if (cl) cl.textContent = localTime(city.tz);
    if (cityLayers[city.name]) {
      cityLayers[city.name].tooltip.setContent(buildTooltipHTML(city));
    }
  });
}

/* ══════════════════════════════════════════════════════
   WEATHER REFRESH
═══════════════════════════════════════════════════════ */
function startWeatherRefresh() {
  if (weatherRefreshTimer) clearInterval(weatherRefreshTimer);
  weatherRefreshTimer = setInterval(async () => {
    if (!selectedCities.length) return;
    setStatus("loading", "Refreshing weather…");
    for (const city of selectedCities) {
      city.weather = await fetchWeather(city.lat, city.lng);
      cityLayers[city.name]?.tooltip.setContent(buildTooltipHTML(city));
    }
    renderSelectedList();
    renderClockPanel();
    setStatus("ok", `Updated ${new Date().toLocaleTimeString()}`);
  }, prefs.refreshInterval);
}

/* ══════════════════════════════════════════════════════
   EXPORT / IMPORT
═══════════════════════════════════════════════════════ */
function exportCities() {
  const data = selectedCities.map(({ name, country, region, lat, lng, tz }) =>
    ({ name, country, region, lat, lng, tz })
  );
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cities.json";
  a.click();
}

function importCities(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const arr = JSON.parse(ev.target.result);
      if (!Array.isArray(arr)) throw new Error();
      arr.forEach(c => {
        if (c.name && c.lat != null && c.lng != null && c.tz) {
          // Merge with ALL_CITIES data if known, else use raw
          const known = ALL_CITIES.find(x => x.name === c.name);
          addCity(known || c);
        }
      });
    } catch (_) {
      alert("Could not import: invalid JSON format.");
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

/* ══════════════════════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════════════════════ */
function switchTab(id, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-browse").classList.toggle("hidden", id !== "browse");
  document.getElementById("panel-selected").classList.toggle("hidden", id !== "selected");
}

function updateSelBadge() {
  document.getElementById("sel-badge").textContent =
    selectedCities.length ? `(${selectedCities.length})` : "";
}

function clearSearch() {
  document.getElementById("search").value = "";
  renderBrowseList();
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("collapsed", !sidebarOpen);
}

function slugify(name) {
  return name.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

function escQ(str) {
  return str.replace(/'/g, "\\'");
}

/* ══════════════════════════════════════════════════════
   PERSISTENCE  –  cities & prefs saved to localStorage
═══════════════════════════════════════════════════════ */
function saveCities() {
  if (!storageAllowed()) return;
  try {
    const slim = selectedCities.map(({ name, country, region, lat, lng, tz }) =>
      ({ name, country, region, lat, lng, tz })
    );
    localStorage.setItem(CITIES_KEY, JSON.stringify(slim));
  } catch (_) {}
}

async function restoreCities() {
  try {
    const raw = localStorage.getItem(CITIES_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!Array.isArray(saved) || !saved.length) return;
    setStatus("loading", `Restoring ${saved.length} saved ${saved.length === 1 ? "city" : "cities"}…`);
    for (const c of saved) {
      const canonical = ALL_CITIES.find(x => x.name === c.name) || c;
      await addCity(canonical);
    }
    setStatus("ok", `Restored ${saved.length} ${saved.length === 1 ? "city" : "cities"}`);
  } catch (_) {}
}

/* ══════════════════════════════════════════════════════
   KEYBOARD SHORTCUT  –  Escape closes prefs
═══════════════════════════════════════════════════════ */
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePrefs();
  if ((e.ctrlKey || e.metaKey) && e.key === "k") {
    document.getElementById("search").focus();
    e.preventDefault();
  }
});

/* ══════════════════════════════════════════════════════
   SEARCH INPUT
═══════════════════════════════════════════════════════ */
document.getElementById("search").addEventListener("input", () => {
  renderBrowseList();
  // Auto-switch to browse tab if user types
  switchTab("browse", document.getElementById("tab-browse"));
});

/* ══════════════════════════════════════════════════════
   COOKIE CONSENT BANNER
═══════════════════════════════════════════════════════ */
function showConsentIfNeeded() {
  if (localStorage.getItem("wtw_consent") === "1") return;
  const banner = document.getElementById("consent-banner");
  if (banner) banner.style.display = "flex";
}

function acceptConsent() {
  localStorage.setItem("wtw_consent", "1");
  const banner = document.getElementById("consent-banner");
  if (banner) banner.style.display = "none";
  // Persist anything already added this session
  saveCities();
  if (storageAllowed()) localStorage.setItem("wtw_prefs_v2", JSON.stringify(prefs));
}

function declineConsent() {
  localStorage.removeItem("wtw_prefs_v2");
  localStorage.removeItem(CITIES_KEY);
  localStorage.removeItem("wtw_consent");
  const banner = document.getElementById("consent-banner");
  if (banner) banner.style.display = "none";
}

/* ══════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════ */
async function init() {
  loadPrefs();
  initMap();
  renderBrowseList();
  renderSelectedList();
  showConsentIfNeeded();

  // Only restore saved cities if user has consented
  if (storageAllowed()) await restoreCities();

  // Tick clock every second
  clockTimer = setInterval(() => {
    tickClocks();
    if (new Date().getSeconds() === 0) updateTerminator();
  }, 1000);

  startWeatherRefresh();
}

window.addEventListener("load", init);
</script>
