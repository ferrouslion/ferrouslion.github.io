<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Time &amp; Weather</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Screen reader only utility class */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Meeting Planner Bar Styling */
    .meeting-planner-bar {
      background: rgba(20, 20, 25, 0.9);
      color: #fff;
      padding: 12px 20px;
      border-top: 1px solid #333;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .planner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }

    .planner-header span {
      font-weight: 600;
      color: #38ef7d;
    }

    .meeting-planner-bar input[type="range"] {
      width: 100%;
      cursor: pointer;
    }

    .reset-btn {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .reset-btn:hover {
      background: #444;
    }

    .file-input-wrapper {
      display: inline-block;
    }

    .btn-secondary {
      background: #2a2d34;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
    }

    .btn-secondary:hover {
      background: #3a3f49;
    }
  </style>
</head>
<body>

  <div id="app-container">
    <!-- Map Canvas Container -->
    <div id="map" role="region" aria-label="World Map Clocks"></div>

    <!-- Sliding Drawer Panel -->
    <div id="drawer">
      <button 
        type="button" 
        id="panelToggleBtn"
        aria-expanded="false" 
        aria-controls="citiesDrawerPanel" 
        aria-label="Toggle Cities List Panel"
        onclick="togglePanel()"
      >
        <div class="handle-bar"></div>
        <div class="btn-content">
          <span class="icon">▲</span>
          <span>Cities</span>
          <span class="icon">▲</span>
        </div>
      </button>

      <div id="citiesDrawerPanel" role="region" aria-label="Saved Cities and Weather List" hidden>
        <div class="panel-header">
          <div class="title-group">
            <span aria-hidden="true">🌍</span>
            <h2>World Time &amp; Weather</h2>
          </div>
          <div class="controls-group">
            <label for="citySortSelect" class="sr-only">Sort Cities By</label>
            <select id="citySortSelect" onchange="handleSortChange(this.value)">
              <option value="name">A–Z</option>
              <option value="region">Region</option>
            </select>
          </div>
        </div>

        <div class="city-list-wrapper">
          <ul id="cityList" aria-live="polite" aria-relevant="additions removals">
            <!-- Dynamic city cards injected here -->
          </ul>
        </div>
      </div>

      <!-- Meeting Planner Scrub Controller -->
      <div class="meeting-planner-bar" aria-label="Meeting Planner Time Scrub">
        <div class="planner-header">
          <label for="timeScrubber"><strong>Meeting Planner:</strong> Scrub Time</label>
          <span id="scrubOffsetLabel" aria-live="polite">Current Time (Live)</span>
          <button type="button" class="reset-btn" onclick="resetTimeScrub()">Reset to Live</button>
        </div>
        <input 
          type="range" 
          id="timeScrubber" 
          min="-12" 
          max="12" 
          value="0" 
          step="0.5" 
          oninput="updateScrubbedTime(this.value)"
          aria-valuemin="-12" 
          aria-valuemax="12" 
          aria-valuenow="0" 
          aria-valuetext="Current Time"
        >
      </div>

      <!-- Bottom Toolbar / Status -->
      <div id="toolbar">
        <button type="button" class="btn-secondary" onclick="openPreferences()">Preferences</button>
        <div id="statusIndicator">
          <span class="dot"></span>
          <span id="statusText">Ready</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Preferences Modal Dialog -->
  <dialog id="preferencesModal" aria-labelledby="prefHeading">
    <div class="modal-content">
      <h2 id="prefHeading">Preferences</h2>

      <div class="field-group">
        <label for="tempUnitSelect">Temperature Unit</label>
        <select id="tempUnitSelect" name="temperatureUnit">
          <option value="celsius">Celsius (°C)</option>
          <option value="fahrenheit">Fahrenheit (°F)</option>
        </select>
      </div>

      <div class="field-group">
        <label for="timeFormatSelect">Time Format</label>
        <select id="timeFormatSelect" name="timeFormat">
          <option value="12">12-hour (3:45 PM)</option>
          <option value="24">24-hour (15:45)</option>
        </select>
      </div>

      <div class="field-group">
        <label for="mapStyleSelect">Map Layer Style</label>
        <select id="mapStyleSelect" name="mapStyle">
          <option value="osm">OpenStreetMap (default)</option>
          <option value="topo">OpenTopoMap</option>
          <option value="dark">CartoDB Dark</option>
          <option value="light">CartoDB Light</option>
        </select>
      </div>

      <div class="field-group">
        <label for="refreshIntervalSelect">Weather Refresh Interval</label>
        <select id="refreshIntervalSelect" name="refreshInterval">
          <option value="300000">Every 5 minutes</option>
          <option value="600000">Every 10 minutes</option>
          <option value="900000">Every 15 minutes</option>
          <option value="1800000">Every 30 minutes</option>
        </select>
      </div>

      <hr style="margin: 15px 0; border: 0; border-top: 1px solid #444;">

      <!-- Data Backup & Restore -->
      <div class="field-group">
        <label>Backup &amp; Restore Settings</label>
        <div style="display: flex; gap: 10px; margin-top: 5px;">
          <button type="button" class="btn-secondary" onclick="exportConfiguration()">Export (JSON)</button>
          <label for="importJsonInput" class="btn-secondary" style="cursor: pointer;">Import (JSON)</label>
          <input type="file" id="importJsonInput" accept=".json" onchange="importConfiguration(event)" style="display:none;">
        </div>
      </div>

      <div class="modal-actions" style="margin-top: 20px; text-align: right;">
        <button type="button" class="btn-secondary" onclick="document.getElementById('preferencesModal').close()">Close</button>
      </div>
    </div>
  </dialog>

  <!-- Notice Banner -->
  <aside aria-label="Privacy Notice">
    <p><strong>This site uses local storage</strong> to remember your selected cities and preferences across visits. No data is sent to any server.</p>
  </aside>

  <!-- Application Logic -->
  <script>
    let timeOffsetHours = 0;

    // Toggle Drawer Panel state
    function togglePanel() {
      const panel = document.getElementById('citiesDrawerPanel');
      const btn = document.getElementById('panelToggleBtn');
      
      const isHidden = panel.hasAttribute('hidden');
      if (isHidden) {
        panel.removeAttribute('hidden');
        btn.setAttribute('aria-expanded', 'true');
      } else {
        panel.setAttribute('hidden', '');
        btn.setAttribute('aria-expanded', 'false');
      }
    }

    // Modal Controller
    function openPreferences() {
      const modal = document.getElementById('preferencesModal');
      if (typeof modal.showModal === 'function') {
        modal.showModal();
      } else {
        alert('Modal dialog is not supported by your browser.');
      }
    }

    // Meeting Planner Time Scrub Logic
    function updateScrubbedTime(offset) {
      timeOffsetHours = parseFloat(offset);
      const label = document.getElementById('scrubOffsetLabel');
      const slider = document.getElementById('timeScrubber');
      
      if (timeOffsetHours === 0) {
        label.textContent = "Current Time (Live)";
        slider.setAttribute('aria-valuetext', 'Current Time');
      } else {
        const sign = timeOffsetHours > 0 ? '+' : '';
        const text = `${sign}${timeOffsetHours} hrs relative to now`;
        label.textContent = text;
        slider.setAttribute('aria-valuetext', text);
      }

      renderAllCityClocks();
    }

    function resetTimeScrub() {
      const slider = document.getElementById('timeScrubber');
      slider.value = 0;
      updateScrubbedTime(0);
    }

    function getEffectiveTime() {
      const now = new Date();
      if (timeOffsetHours !== 0) {
        now.setTime(now.getTime() + (timeOffsetHours * 60 * 60 * 1000));
      }
      return now;
    }

    function renderAllCityClocks() {
      // Refresh city clock nodes based on getEffectiveTime()
    }

    // Export local storage settings to JSON
    function exportConfiguration() {
      const config = {
        cities: JSON.parse(localStorage.getItem('world_clock_cities') || '[]'),
        preferences: JSON.parse(localStorage.getItem('world_clock_prefs') || '{}'),
        exportedAt: new Date().toISOString()
      };

      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `world_clock_backup_${Date.now()}.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    // Import settings from JSON file
    function importConfiguration(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (data.cities) localStorage.setItem('world_clock_cities', JSON.stringify(data.cities));
          if (data.preferences) localStorage.setItem('world_clock_prefs', JSON.stringify(data.preferences));
          
          alert('Preferences imported successfully! Reloading...');
          window.location.reload();
        } catch (err) {
          alert('Invalid JSON file format.');
        }
      };
      reader.readAsText(file);
    }
  </script>
</body>
</html>
